services:
  pgsql:
    image: "postgres:18"
    container_name: "pgsql"
    environment:
      - POSTGRES_PASSWORD=qwerty
    ports:
      - "5432:5432"
    volumes:
      - "pg-data:/var/lib/postgresql"
    networks:
      - mynet

volumes:
  pg-data:

networks:
  mynet:
    name: mynet
    external: true

